<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FuelApp — Prix carburants France</title>
  <meta name="description" content="Application de comparaison des prix carburants en France."/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0b7f88"/>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin=""/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin=""/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="28">
          <path d="M16 2C16 2 4 14.5 4 23a12 12 0 0 0 24 0C28 14.5 16 2 16 2z" fill="white" opacity=".95"/>
          <path d="M16 10C16 10 9 18 9 23a7 7 0 0 0 14 0C23 18 16 10 16 10z" fill="white" opacity=".35"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">FuelApp</div>
        <div class="brand-tag">Prix carburants France</div>
      </div>
    </div>

    <nav class="nav-top">
      <button class="nav-btn active" data-view="mapView"><span class="nav-ico">🗺️</span><span>Carte</span></button>
      <button class="nav-btn" data-view="authView"><span class="nav-ico">👤</span><span>Compte</span></button>
      <button class="nav-btn" data-view="communityView"><span class="nav-ico">💬</span><span>Communauté</span></button>
      <button class="nav-btn" data-view="adminView" id="adminBtn"><span class="nav-ico">🛡️</span><span>Admin</span><span class="blob-err" id="adminBlob">0</span></button>
      <button class="btn btn-acc" id="seedBtn" type="button" style="margin-left:.5rem">🎭 Démo</button>
    </nav>

    <div class="themebar" title="Mode sombre/clair">
      <label class="ios-sw" style="cursor:pointer">
        <input type="checkbox" id="themeChk"/>
        <div class="ios-track"></div>
        <div class="ios-knob">
          <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </div>
      </label>
    </div>
  </header>

  <main class="layout">
    <!-- ===== PANNEAU GAUCHE / BOTTOM SHEET MOBILE ===== -->
    <aside class="station-panel" id="stationPanel">
      <div class="drag-handle" id="dragHandle"></div>

      <!-- Card unique : recherche + filtres + liste stations -->
      <section class="card search-shell">
        <div class="search-top">
          <button class="city-pill" id="cityBtn" type="button">
            <span class="city-ico">🏠</span>
            <span>Ville</span>
          </button>
          <button class="around-btn" id="aroundMeBtn" type="button">
            <span class="pin">📍</span>
            <span>Autour de moi</span>
          </button>
        </div>

        <div class="city-search" id="citySearch" style="display:none">
          <div class="fld">
            <label>Ville ou adresse</label>
            <input id="cityInput" type="text" placeholder="Paris, 12 rue de Rivoli…"/>
          </div>
        </div>

        <div class="around-menu" id="aroundMenu">
          <div class="radius-row">
            <span class="radius-label">Rayon</span>
            <span class="radius-value"><span id="radiusVal">50</span> km</span>
          </div>
          <input type="range" id="radiusRange" min="1" max="100" value="50" step="1" class="radius-slider"/>
          <button class="find-btn" id="locateBtn" type="button">
            <span class="pin">📍</span>
            <span>Trouver autour de moi</span>
          </button>
        </div>

        <!-- Filtres carburant avec prix moyen dynamique -->
        <div class="fuel-pills" id="fuelPills">
          <button class="fuel-pill active" data-fuel="Gazole">Gazole<span class="pill-avg" id="avg-Gazole"></span></button>
          <button class="fuel-pill" data-fuel="SP95-E10">E10<span class="pill-avg" id="avg-SP95-E10"></span></button>
          <button class="fuel-pill" data-fuel="SP98">SP98<span class="pill-avg" id="avg-SP98"></span></button>
          <button class="fuel-pill" data-fuel="SP95">SP95<span class="pill-avg" id="avg-SP95"></span></button>
          <button class="fuel-pill" data-fuel="E85">E85<span class="pill-avg" id="avg-E85"></span></button>
          <button class="fuel-pill" data-fuel="GPLc">GPLc<span class="pill-avg" id="avg-GPLc"></span></button>
        </div>

        <div class="status-tabs">
          <button class="status-pill active" data-status="all">Tous</button>
          <button class="status-pill good" data-status="cheaper"><span class="status-dot"></span>Moins cher</button>
          <button class="status-pill mid" data-status="mid"><span class="status-dot"></span>Moyen</button>
          <button class="status-pill high" data-status="higher"><span class="status-dot"></span>Plus cher</button>
          <div class="mini-best" id="bestPriceMini">— min</div>
        </div>

        <!-- Liste des stations DANS la même card -->
        <div class="stations-divider"></div>
        <div id="stationList"></div>
      </section>

      <!-- Fiche détail station (hors card, overlay style) -->
      <div id="stationDetails"></div>

      <!-- Vue Compte -->
      <section class="view" id="authView">
        <div class="card">
          <div class="card-head"><span class="card-title">Créer un compte</span><span class="badge bg-pri">profil</span></div>
          <form id="registerForm" class="form-grid">
            <div class="fld"><label>Prénom</label><input name="name" required placeholder="Camille"/></div>
            <div class="fld"><label>Email</label><input name="email" type="email" required placeholder="camille@email.fr"/></div>
            <div class="fld"><label>Mot de passe</label><input name="password" type="password" required placeholder="••••••••"/></div>
            <div class="fld"><label>Carburant préféré</label><select name="preferredFuel" id="profileFuelSelect"></select></div>
            <button class="btn btn-pri full" type="submit">Créer mon compte →</button>
          </form>
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Session active</span></div>
          <div id="sessionCard"><div class="empty"><h3>Invité</h3><p>Créez un compte pour commenter.</p></div></div>
        </div>
      </section>

      <!-- Vue Communauté -->
      <section class="view" id="communityView">
        <div class="card">
          <div class="card-head"><span class="card-title">💬 Commenter</span><span class="badge bg-pri">modération</span></div>
          <form id="commentForm" class="form-grid" style="grid-template-columns:1fr">
            <div class="fld"><label>Station</label><select id="commentStation"></select></div>
            <div class="fld"><label>Commentaire</label><textarea id="commentText" placeholder="Prix corrects ce matin…"></textarea></div>
            <div class="uploader">
              <div class="fld"><label>Photo / preuve</label><input id="commentPhoto" type="file" accept="image/*"/></div>
              <div class="preview" id="commentPreview">
                <img id="commentPreviewImg" alt="Aperçu"/>
                <div class="meta"><b id="commentPreviewName">—</b><span id="commentPreviewSize">—</span></div>
              </div>
            </div>
            <button class="btn btn-pri" type="submit">Envoyer →</button>
          </form>
        </div>
      </section>
    </aside>

    <!-- ===== CARTE ===== -->
    <section class="map-panel" id="mapPanel">
      <div id="map"></div>

      <!-- Badge stations persistant centré en haut de carte -->
      <div class="map-station-badge" id="mapStationBadge">
        <span class="msb-dot" id="msbDot"></span>
        <span id="mapStationCount">Chargement…</span>
      </div>

      <button class="map-close-detail" id="closeDetail" style="display:none" title="Fermer la fiche">&times;</button>
    </section>

    <!-- ===== ADMIN ===== -->
    <section class="admin-panel" id="adminPanel" style="display:none">
      <div class="card">
        <div class="card-head"><span class="card-title">File de modération</span><span class="badge bg-acc" id="adminQueueCount">0</span></div>
        <div id="adminQueueFull" class="log-list"></div>
      </div>
      <div class="card" style="margin-top:1rem">
        <div class="card-head"><span class="card-title">Journal d'activité</span></div>
        <div id="activityLog" class="log-list"></div>
      </div>
    </section>
  </main>
</div>

<div id="toast" class="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
  }
</script>
<script src="js/app.js"></script>
</body>
</html>
